<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Idea Parking Lot</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=DM+Mono:wght@300;400;500&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
  /* ── CONFIG: paste your Supabase URL + anon key here ── */
  :root {
    --sb-url: 'PASTE_YOUR_SUPABASE_URL';
    --sb-key: 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InVic2twdXJ0emdpbGpocWxvbGJmIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzYwMTU0NzAsImV4cCI6MjA5MTU5MTQ3MH0.qQl-mjVzfpJTFvdEYWiu6-CqKGFzgcLmlFP3NgUphOs';

    --bg: #0f0f0e;
    --bg2: #1a1a18;
    --bg3: #222220;
    --border: rgba(255,255,255,0.08);
    --border2: rgba(255,255,255,0.14);
    --text: #f0ede6;
    --text2: #8a877e;
    --text3: #4a4845;
    --accent: #d4c5a9;
    --gold: #c9a84c;
    --gold-dim: rgba(201,168,76,0.15);
    --green: #4a8c6a;
    --green-dim: rgba(74,140,106,0.15);
    --blue: #4a6e8c;
    --blue-dim: rgba(74,110,140,0.15);
    --amber: #8c6a2a;
    --amber-dim: rgba(140,106,42,0.15);
    --red: #8c4a4a;
    --red-dim: rgba(140,74,74,0.15);
    --radius: 10px;
    --radius-sm: 6px;
  }

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  html { font-size: 16px; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'DM Mono', monospace;
    font-weight: 300;
    min-height: 100vh;
    line-height: 1.6;
  }

  /* ── AUTH SCREEN ── */
  #auth-screen {
    display: flex;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    padding: 2rem;
  }

  .auth-card {
    width: 100%;
    max-width: 380px;
    background: var(--bg2);
    border: 1px solid var(--border2);
    border-radius: 16px;
    padding: 2.5rem;
  }

  .auth-logo {
    font-family: 'Instrument Serif', serif;
    font-size: 28px;
    color: var(--accent);
    margin-bottom: 0.25rem;
  }

  .auth-sub {
    font-size: 12px;
    color: var(--text2);
    margin-bottom: 2rem;
    letter-spacing: 0.04em;
  }

  .auth-tabs {
    display: flex;
    gap: 0;
    margin-bottom: 1.5rem;
    border: 1px solid var(--border);
    border-radius: var(--radius-sm);
    overflow: hidden;
  }

  .auth-tab {
    flex: 1;
    padding: 8px;
    font-size: 12px;
    font-family: 'DM Mono', monospace;
    font-weight: 400;
    letter-spacing: 0.05em;
    background: transparent;
    color: var(--text2);
    border: none;
    cursor: pointer;
    transition: all 0.2s;
  }

  .auth-tab.active {
    background: var(--bg3);
    color: var(--text);
  }

  .auth-field {
    margin-bottom: 1rem;
  }

  .auth-field label {
    display: block;
    font-size: 11px;
    color: var(--text2);
    margin-bottom: 6px;
    letter-spacing: 0.06em;
    text-transform: uppercase;
  }

  .auth-field input {
    width: 100%;
    background: var(--bg3);
    border: 1px solid var(--border);
    border-radius: var(--radius-sm);
    padding: 10px 12px;
    font-size: 13px;
    font-family: 'DM Mono', monospace;
    color: var(--text);
    outline: none;
    transition: border-color 0.2s;
  }

  .auth-field input:focus { border-color: var(--border2); }

  .auth-btn {
    width: 100%;
    padding: 11px;
    background: var(--accent);
    color: var(--bg);
    border: none;
    border-radius: var(--radius-sm);
    font-size: 13px;
    font-family: 'DM Mono', monospace;
    font-weight: 500;
    letter-spacing: 0.04em;
    cursor: pointer;
    transition: opacity 0.2s;
    margin-top: 0.5rem;
  }

  .auth-btn:hover { opacity: 0.85; }
  .auth-btn:disabled { opacity: 0.4; cursor: not-allowed; }

  .auth-msg {
    font-size: 12px;
    margin-top: 1rem;
    text-align: center;
    min-height: 18px;
  }

  .auth-msg.error { color: #c47a7a; }
  .auth-msg.success { color: #6aab88; }

  /* ── APP LAYOUT ── */
  #app-screen { display: none; min-height: 100vh; }

  .app-header {
    border-bottom: 1px solid var(--border);
    padding: 0 2rem;
    display: flex;
    align-items: center;
    justify-content: space-between;
    height: 56px;
    position: sticky;
    top: 0;
    background: rgba(15,15,14,0.92);
    backdrop-filter: blur(8px);
    z-index: 100;
  }

  .app-logo {
    font-family: 'Instrument Serif', serif;
    font-size: 20px;
    color: var(--accent);
    display: flex;
    align-items: center;
    gap: 8px;
  }

  .app-logo-dot {
    width: 6px;
    height: 6px;
    border-radius: 50%;
    background: var(--gold);
    animation: pulse 3s ease-in-out infinite;
  }

  @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.4} }

  .header-right {
    display: flex;
    align-items: center;
    gap: 12px;
  }

  .user-email {
    font-size: 11px;
    color: var(--text3);
    display: none;
  }

  @media(min-width:600px) { .user-email { display: block; } }

  .signout-btn {
    font-size: 11px;
    font-family: 'DM Mono', monospace;
    background: transparent;
    border: 1px solid var(--border);
    color: var(--text2);
    padding: 5px 10px;
    border-radius: var(--radius-sm);
    cursor: pointer;
    transition: all 0.2s;
    letter-spacing: 0.04em;
  }

  .signout-btn:hover { border-color: var(--border2); color: var(--text); }

  .app-main {
    max-width: 780px;
    margin: 0 auto;
    padding: 2rem 1.25rem;
  }

  /* ── STATS ── */
  .stats-row {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 10px;
    margin-bottom: 2rem;
  }

  @media(max-width:500px) { .stats-row { grid-template-columns: repeat(2,1fr); } }

  .stat-box {
    background: var(--bg2);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 14px 16px;
  }

  .stat-num {
    font-size: 26px;
    font-weight: 400;
    font-family: 'Instrument Serif', serif;
    color: var(--accent);
    line-height: 1;
  }

  .stat-lbl {
    font-size: 10px;
    color: var(--text3);
    margin-top: 4px;
    letter-spacing: 0.06em;
    text-transform: uppercase;
  }

  /* ── CAPTURE ── */
  .capture-card {
    background: var(--bg2);
    border: 1px solid var(--border2);
    border-radius: var(--radius);
    padding: 1.25rem;
    margin-bottom: 1.5rem;
  }

  .capture-top {
    display: flex;
    gap: 10px;
    align-items: flex-start;
  }

  #idea-input {
    flex: 1;
    background: transparent;
    border: none;
    outline: none;
    font-size: 15px;
    font-family: 'DM Mono', monospace;
    font-weight: 300;
    color: var(--text);
    resize: none;
    min-height: 38px;
    max-height: 140px;
    line-height: 1.6;
    padding-top: 6px;
  }

  #idea-input::placeholder { color: var(--text3); }

  .park-btn {
    padding: 8px 18px;
    background: var(--accent);
    color: var(--bg);
    border: none;
    border-radius: var(--radius-sm);
    font-size: 12px;
    font-family: 'DM Mono', monospace;
    font-weight: 500;
    letter-spacing: 0.05em;
    cursor: pointer;
    white-space: nowrap;
    transition: opacity 0.2s;
    flex-shrink: 0;
  }

  .park-btn:hover { opacity: 0.85; }

  .capture-meta {
    display: flex;
    gap: 8px;
    margin-top: 12px;
    align-items: center;
    flex-wrap: wrap;
    border-top: 1px solid var(--border);
    padding-top: 12px;
  }

  .meta-select, .meta-input {
    background: var(--bg3);
    border: 1px solid var(--border);
    border-radius: var(--radius-sm);
    padding: 5px 9px;
    font-size: 12px;
    font-family: 'DM Mono', monospace;
    color: var(--text);
    outline: none;
    transition: border-color 0.2s;
    appearance: none;
  }

  .meta-select:focus, .meta-input:focus { border-color: var(--border2); }

  #tag-input { width: 120px; }
  #tag-input::placeholder { color: var(--text3); }

  .energy-group {
    display: flex;
    gap: 0;
    border: 1px solid var(--border);
    border-radius: var(--radius-sm);
    overflow: hidden;
  }

  .e-btn {
    padding: 5px 10px;
    font-size: 11px;
    font-family: 'DM Mono', monospace;
    background: transparent;
    border: none;
    color: var(--text2);
    cursor: pointer;
    letter-spacing: 0.04em;
    transition: all 0.15s;
  }

  .e-btn.active[data-e="low"]    { background: var(--blue-dim);  color: #7aacc9; }
  .e-btn.active[data-e="medium"] { background: var(--amber-dim); color: #c9a84c; }
  .e-btn.active[data-e="high"]   { background: var(--green-dim); color: #6aab88; }

  /* ── TOOLBAR ── */
  .toolbar {
    display: flex;
    gap: 8px;
    margin-bottom: 1.25rem;
    flex-wrap: wrap;
    align-items: center;
  }

  #search-input {
    flex: 1;
    min-width: 140px;
    background: var(--bg2);
    border: 1px solid var(--border);
    border-radius: var(--radius-sm);
    padding: 7px 12px;
    font-size: 12px;
    font-family: 'DM Mono', monospace;
    color: var(--text);
    outline: none;
    transition: border-color 0.2s;
  }

  #search-input:focus { border-color: var(--border2); }
  #search-input::placeholder { color: var(--text3); }

  .chip-row { display: flex; gap: 6px; flex-wrap: wrap; }

  .chip {
    padding: 5px 12px;
    font-size: 11px;
    font-family: 'DM Mono', monospace;
    letter-spacing: 0.04em;
    border: 1px solid var(--border);
    border-radius: 20px;
    background: transparent;
    color: var(--text2);
    cursor: pointer;
    transition: all 0.15s;
    white-space: nowrap;
  }

  .chip.active { background: var(--bg3); border-color: var(--border2); color: var(--text); }

  .sort-sel {
    background: var(--bg2);
    border: 1px solid var(--border);
    border-radius: var(--radius-sm);
    padding: 6px 9px;
    font-size: 11px;
    font-family: 'DM Mono', monospace;
    color: var(--text2);
    outline: none;
    appearance: none;
    cursor: pointer;
  }

  /* ── TAG FILTER ROW ── */
  .tag-filter-row {
    display: flex;
    gap: 6px;
    flex-wrap: wrap;
    margin-bottom: 1.25rem;
  }

  /* ── IDEAS ── */
  .ideas-list { display: flex; flex-direction: column; gap: 8px; }

  .idea-card {
    background: var(--bg2);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 1rem 1.125rem;
    transition: border-color 0.15s;
    position: relative;
  }

  .idea-card:hover { border-color: var(--border2); }

  .idea-card.priority-on { border-left: 2px solid var(--gold); }

  .card-row1 { display: flex; gap: 10px; align-items: flex-start; }

  .energy-pip {
    width: 6px;
    height: 6px;
    border-radius: 50%;
    flex-shrink: 0;
    margin-top: 7px;
  }

  .ep-low    { background: var(--blue); }
  .ep-medium { background: var(--amber); }
  .ep-high   { background: var(--green); }

  .card-body { flex: 1; min-width: 0; }

  .card-text {
    font-size: 14px;
    color: var(--text);
    line-height: 1.55;
    word-break: break-word;
  }

  .card-text[contenteditable="true"] {
    outline: none;
    border-bottom: 1px solid var(--border2);
    padding-bottom: 2px;
  }

  .card-meta2 {
    display: flex;
    gap: 8px;
    align-items: center;
    margin-top: 8px;
    flex-wrap: wrap;
  }

  .badge {
    font-size: 10px;
    padding: 2px 9px;
    border-radius: 20px;
    letter-spacing: 0.04em;
    font-weight: 400;
  }

  .b-raw        { background: var(--bg3);       color: var(--text2);  border: 1px solid var(--border); }
  .b-in-progress{ background: var(--amber-dim); color: #c9a84c; }
  .b-parked     { background: var(--blue-dim);  color: #7aacc9; }
  .b-discarded  { background: var(--red-dim);   color: #c47a7a; }
  .b-shipped    { background: var(--green-dim); color: #6aab88; }

  .tag-badge {
    font-size: 10px;
    color: var(--text3);
    letter-spacing: 0.04em;
  }

  .age-badge { font-size: 10px; color: var(--text3); }

  .card-actions {
    display: flex;
    gap: 2px;
    opacity: 0;
    transition: opacity 0.15s;
    flex-shrink: 0;
  }

  .idea-card:hover .card-actions { opacity: 1; }

  .act {
    width: 28px;
    height: 28px;
    background: transparent;
    border: none;
    color: var(--text3);
    cursor: pointer;
    border-radius: var(--radius-sm);
    font-size: 13px;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: all 0.15s;
  }

  .act:hover { background: var(--bg3); color: var(--text); }

  .star-act { cursor: pointer; user-select: none; }
  .star-act.on { color: var(--gold); opacity: 1 !important; }

  /* ── EXPANDABLE PANELS ── */
  .card-notes, .card-status-panel { display: none; }
  .card-notes.open, .card-status-panel.open { display: block; }

  .notes-area {
    width: 100%;
    margin-top: 12px;
    background: var(--bg3);
    border: 1px solid var(--border);
    border-radius: var(--radius-sm);
    padding: 10px 12px;
    font-size: 12px;
    font-family: 'DM Mono', monospace;
    font-weight: 300;
    color: var(--text);
    resize: none;
    outline: none;
    line-height: 1.6;
    min-height: 70px;
  }

  .notes-area::placeholder { color: var(--text3); }

  .status-panel-inner {
    display: flex;
    gap: 6px;
    flex-wrap: wrap;
    margin-top: 10px;
    padding-top: 10px;
    border-top: 1px solid var(--border);
  }

  .s-opt {
    font-size: 11px;
    font-family: 'DM Mono', monospace;
    padding: 4px 12px;
    border-radius: 20px;
    border: 1px solid var(--border);
    background: transparent;
    color: var(--text2);
    cursor: pointer;
    transition: all 0.15s;
    letter-spacing: 0.03em;
  }

  .s-opt:hover { background: var(--bg3); color: var(--text); }

  /* ── LOADING / EMPTY ── */
  .loading {
    text-align: center;
    padding: 3rem;
    font-size: 12px;
    color: var(--text3);
    letter-spacing: 0.06em;
  }

  .empty-state {
    text-align: center;
    padding: 4rem 1rem;
    color: var(--text3);
    font-size: 12px;
    letter-spacing: 0.04em;
    display: none;
  }

  .empty-icon {
    font-family: 'Instrument Serif', serif;
    font-size: 40px;
    color: var(--text3);
    margin-bottom: 1rem;
    display: block;
    opacity: 0.3;
  }

  /* ── TOAST ── */
  #toast {
    position: fixed;
    bottom: 1.5rem;
    left: 50%;
    transform: translateX(-50%) translateY(20px);
    background: var(--bg3);
    border: 1px solid var(--border2);
    border-radius: var(--radius-sm);
    padding: 10px 18px;
    font-size: 12px;
    color: var(--text2);
    opacity: 0;
    transition: all 0.25s;
    pointer-events: none;
    z-index: 9999;
    white-space: nowrap;
    letter-spacing: 0.04em;
  }

  #toast.show {
    opacity: 1;
    transform: translateX(-50%) translateY(0);
  }

  /* ── SYNC INDICATOR ── */
  .sync-dot {
    width: 6px;
    height: 6px;
    border-radius: 50%;
    background: var(--green);
    opacity: 0;
    transition: opacity 0.3s;
  }

  .sync-dot.syncing {
    opacity: 1;
    animation: syncpulse 0.8s ease-in-out infinite;
  }

  @keyframes syncpulse { 0%,100%{opacity:0.3} 50%{opacity:1} }
</style>
</head>
<body>

<!-- AUTH SCREEN -->
<div id="auth-screen">
  <div class="auth-card">
    <div class="auth-logo">Idea Parking Lot</div>
    <div class="auth-sub">// your ideas, anywhere</div>
    <div class="auth-tabs">
      <button class="auth-tab active" id="tab-in">Sign in</button>
      <button class="auth-tab" id="tab-up">Create account</button>
    </div>
    <div class="auth-field">
      <label>Email</label>
      <input type="email" id="auth-email" placeholder="you@example.com" autocomplete="email">
    </div>
    <div class="auth-field">
      <label>Password</label>
      <input type="password" id="auth-pass" placeholder="••••••••" autocomplete="current-password">
    </div>
    <button class="auth-btn" id="auth-submit">Sign in</button>
    <div class="auth-msg" id="auth-msg"></div>
  </div>
</div>

<!-- APP SCREEN -->
<div id="app-screen">
  <header class="app-header">
    <div class="app-logo">
      <div class="app-logo-dot"></div>
      Idea Parking Lot
    </div>
    <div class="header-right">
      <div class="sync-dot" id="sync-dot"></div>
      <span class="user-email" id="user-email"></span>
      <button class="signout-btn" id="signout-btn">sign out</button>
    </div>
  </header>

  <main class="app-main">
    <div class="stats-row" id="stats-row">
      <div class="stat-box"><div class="stat-num" id="st-total">0</div><div class="stat-lbl">total</div></div>
      <div class="stat-box"><div class="stat-num" id="st-raw">0</div><div class="stat-lbl">raw</div></div>
      <div class="stat-box"><div class="stat-num" id="st-prog">0</div><div class="stat-lbl">in progress</div></div>
      <div class="stat-box"><div class="stat-num" id="st-ship">0</div><div class="stat-lbl">shipped</div></div>
    </div>

    <div class="capture-card">
      <div class="capture-top">
        <textarea id="idea-input" rows="1" placeholder="What's the idea? Park it before it drives away..."></textarea>
        <button class="park-btn" id="park-btn">PARK IT</button>
      </div>
      <div class="capture-meta">
        <select class="meta-select" id="status-sel">
          <option value="raw">raw idea</option>
          <option value="in-progress">in progress</option>
          <option value="parked">parked</option>
          <option value="discarded">discarded</option>
          <option value="shipped">shipped</option>
        </select>
        <input class="meta-input" id="tag-input" placeholder="tag..." maxlength="30">
        <div class="energy-group">
          <button class="e-btn" data-e="low">low</button>
          <button class="e-btn active" data-e="medium">med</button>
          <button class="e-btn" data-e="high">high</button>
        </div>
      </div>
    </div>

    <div class="toolbar">
      <input id="search-input" placeholder="search...">
      <div class="chip-row" id="status-chips">
        <button class="chip active" data-s="all">all</button>
        <button class="chip" data-s="raw">raw</button>
        <button class="chip" data-s="in-progress">in progress</button>
        <button class="chip" data-s="parked">parked</button>
        <button class="chip" data-s="shipped">shipped</button>
        <button class="chip" data-s="discarded">discarded</button>
      </div>
      <select class="sort-sel" id="sort-sel">
        <option value="newest">newest</option>
        <option value="oldest">oldest</option>
        <option value="priority">priority</option>
        <option value="energy">energy</option>
      </select>
    </div>

    <div class="tag-filter-row" id="tag-filter-row"></div>

    <div id="loading" class="loading">loading ideas...</div>
    <div class="ideas-list" id="ideas-list"></div>
    <div class="empty-state" id="empty-state">
      <span class="empty-icon">P</span>
      the lot is empty — park your first idea above
    </div>
  </main>
</div>

<div id="toast"></div>

<script>
// ── SUPABASE CONFIG ──────────────────────────────────────────────────────────
// Replace these two values with yours from the Supabase dashboard → Settings → API
const SUPABASE_URL = 'PASTE_YOUR_SUPABASE_URL';
const SUPABASE_ANON_KEY = 'PASTE_YOUR_SUPABASE_ANON_KEY';

const sb = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

// ── STATE ────────────────────────────────────────────────────────────────────
let ideas = [];
let currentUser = null;
let filterStatus = 'all';
let filterTag = 'all';
let sortBy = 'newest';
let searchQ = '';
let selectedEnergy = 'medium';

// ── HELPERS ──────────────────────────────────────────────────────────────────
function esc(s) {
  return (s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

function ageLabel(ts) {
  const d = Date.now() - new Date(ts).getTime();
  const m=60000, h=3600000, day=86400000;
  if (d < m)      return 'just now';
  if (d < h)      return Math.floor(d/m) + 'm ago';
  if (d < day)    return Math.floor(d/h) + 'h ago';
  if (d < 7*day)  return Math.floor(d/day) + 'd ago';
  if (d < 30*day) return Math.floor(d/(7*day)) + 'w ago';
  return Math.floor(d/(30*day)) + 'mo ago';
}

const STATUS_LABELS = {
  raw: 'raw', 'in-progress': 'in progress', parked: 'parked',
  discarded: 'discarded', shipped: 'shipped'
};

const ENERGY_ORDER = { low: 0, medium: 1, high: 2 };

function toast(msg, duration=2200) {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.classList.add('show');
  setTimeout(() => el.classList.remove('show'), duration);
}

function syncAnim(on) {
  document.getElementById('sync-dot').classList.toggle('syncing', on);
}

// ── AUTH ─────────────────────────────────────────────────────────────────────
let authMode = 'signin';

document.getElementById('tab-in').addEventListener('click', () => {
  authMode = 'signin';
  document.getElementById('tab-in').classList.add('active');
  document.getElementById('tab-up').classList.remove('active');
  document.getElementById('auth-submit').textContent = 'Sign in';
  document.getElementById('auth-msg').textContent = '';
});

document.getElementById('tab-up').addEventListener('click', () => {
  authMode = 'signup';
  document.getElementById('tab-up').classList.add('active');
  document.getElementById('tab-in').classList.remove('active');
  document.getElementById('auth-submit').textContent = 'Create account';
  document.getElementById('auth-msg').textContent = '';
});

document.getElementById('auth-submit').addEventListener('click', async () => {
  const email = document.getElementById('auth-email').value.trim();
  const pass  = document.getElementById('auth-pass').value;
  const msg   = document.getElementById('auth-msg');
  const btn   = document.getElementById('auth-submit');

  if (!email || !pass) { msg.textContent = 'Email and password required.'; msg.className = 'auth-msg error'; return; }

  btn.disabled = true;
  msg.textContent = '...';
  msg.className = 'auth-msg';

  let result;
  if (authMode === 'signin') {
    result = await sb.auth.signInWithPassword({ email, password: pass });
  } else {
    result = await sb.auth.signUp({ email, password: pass });
  }

  btn.disabled = false;

  if (result.error) {
    msg.textContent = result.error.message;
    msg.className = 'auth-msg error';
  } else if (authMode === 'signup' && !result.data.session) {
    msg.textContent = 'Check your email to confirm your account.';
    msg.className = 'auth-msg success';
  } else {
    // session established — onAuthStateChange will fire
  }
});

document.getElementById('auth-email').addEventListener('keydown', e => { if(e.key==='Enter') document.getElementById('auth-pass').focus(); });
document.getElementById('auth-pass').addEventListener('keydown', e => { if(e.key==='Enter') document.getElementById('auth-submit').click(); });

document.getElementById('signout-btn').addEventListener('click', async () => {
  await sb.auth.signOut();
});

sb.auth.onAuthStateChange((event, session) => {
  if (session) {
    currentUser = session.user;
    document.getElementById('auth-screen').style.display = 'none';
    document.getElementById('app-screen').style.display = 'block';
    document.getElementById('user-email').textContent = currentUser.email;
    loadIdeas();
  } else {
    currentUser = null;
    ideas = [];
    document.getElementById('auth-screen').style.display = 'flex';
    document.getElementById('app-screen').style.display = 'none';
  }
});

// ── SUPABASE DATA ────────────────────────────────────────────────────────────
async function loadIdeas() {
  document.getElementById('loading').style.display = 'block';
  document.getElementById('ideas-list').innerHTML = '';

  const { data, error } = await sb
    .from('ideas')
    .select('*')
    .eq('user_id', currentUser.id)
    .order('created_at', { ascending: false });

  document.getElementById('loading').style.display = 'none';

  if (error) { toast('Error loading ideas'); console.error(error); return; }
  ideas = data || [];
  render();

  // realtime subscription
  sb.channel('ideas-changes')
    .on('postgres_changes', { event: '*', schema: 'public', table: 'ideas', filter: `user_id=eq.${currentUser.id}` }, payload => {
      handleRealtimeChange(payload);
    })
    .subscribe();
}

function handleRealtimeChange(payload) {
  const { eventType, new: n, old: o } = payload;
  if (eventType === 'INSERT') {
    if (!ideas.find(i => i.id === n.id)) { ideas.unshift(n); render(); }
  } else if (eventType === 'UPDATE') {
    const idx = ideas.findIndex(i => i.id === n.id);
    if (idx !== -1) { ideas[idx] = n; render(); }
  } else if (eventType === 'DELETE') {
    ideas = ideas.filter(i => i.id !== o.id); render();
  }
}

async function addIdea(text, tag, status, energy) {
  syncAnim(true);
  const { data, error } = await sb.from('ideas').insert([{
    user_id: currentUser.id,
    text,
    tag: tag || null,
    status,
    energy,
    priority: false,
    notes: '',
    created_at: new Date().toISOString()
  }]).select().single();
  syncAnim(false);
  if (error) { toast('Failed to save'); console.error(error); return; }
  ideas.unshift(data);
  render();
  toast('idea parked');
}

async function updateIdea(id, changes) {
  syncAnim(true);
  const { error } = await sb.from('ideas').update(changes).eq('id', id).eq('user_id', currentUser.id);
  syncAnim(false);
  if (error) { console.error(error); return; }
  const idx = ideas.findIndex(i => i.id === id);
  if (idx !== -1) Object.assign(ideas[idx], changes);
}

async function deleteIdea(id) {
  syncAnim(true);
  const { error } = await sb.from('ideas').delete().eq('id', id).eq('user_id', currentUser.id);
  syncAnim(false);
  if (error) { toast('Failed to delete'); return; }
  ideas = ideas.filter(i => i.id !== id);
  render();
  toast('idea removed');
}

// ── CAPTURE ──────────────────────────────────────────────────────────────────
const ideaInput = document.getElementById('idea-input');
ideaInput.addEventListener('input', () => {
  ideaInput.style.height = 'auto';
  ideaInput.style.height = ideaInput.scrollHeight + 'px';
});
ideaInput.addEventListener('keydown', e => {
  if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); parkIdea(); }
});

document.getElementById('park-btn').addEventListener('click', parkIdea);

document.querySelectorAll('.e-btn').forEach(b => {
  b.addEventListener('click', () => {
    document.querySelectorAll('.e-btn').forEach(x => x.classList.remove('active'));
    b.classList.add('active');
    selectedEnergy = b.dataset.e;
  });
});

async function parkIdea() {
  const text = ideaInput.value.trim();
  if (!text) { ideaInput.focus(); return; }
  const tag    = document.getElementById('tag-input').value.trim().toLowerCase().replace(/\s+/g,'-');
  const status = document.getElementById('status-sel').value;
  ideaInput.value = '';
  ideaInput.style.height = 'auto';
  document.getElementById('tag-input').value = '';
  document.getElementById('status-sel').value = 'raw';
  document.querySelectorAll('.e-btn').forEach(x => x.classList.remove('active'));
  document.querySelector('.e-btn[data-e="medium"]').classList.add('active');
  selectedEnergy = 'medium';
  filterStatus = 'all'; filterTag = 'all'; searchQ = '';
  document.getElementById('search-input').value = '';
  document.querySelectorAll('[data-s]').forEach(c => c.classList.toggle('active', c.dataset.s === 'all'));
  await addIdea(text, tag, status, energy=selectedEnergy||'medium');
  document.getElementById('ideas-list').firstChild?.scrollIntoView({ behavior:'smooth', block:'nearest' });
}

// ── FILTERS / SORT ───────────────────────────────────────────────────────────
document.getElementById('search-input').addEventListener('input', e => { searchQ = e.target.value.toLowerCase(); render(); });
document.getElementById('sort-sel').addEventListener('change', e => { sortBy = e.target.value; render(); });

document.getElementById('status-chips').addEventListener('click', e => {
  const chip = e.target.closest('[data-s]');
  if (!chip) return;
  filterStatus = chip.dataset.s;
  document.querySelectorAll('[data-s]').forEach(c => c.classList.toggle('active', c === chip));
  render();
});

// ── RENDER ───────────────────────────────────────────────────────────────────
function getFiltered() {
  let list = [...ideas];
  if (searchQ) list = list.filter(i => (i.text||'').toLowerCase().includes(searchQ) || (i.tag||'').toLowerCase().includes(searchQ) || (i.notes||'').toLowerCase().includes(searchQ));
  if (filterStatus !== 'all') list = list.filter(i => i.status === filterStatus);
  if (filterTag !== 'all') list = list.filter(i => i.tag === filterTag);
  if (sortBy === 'newest')   list.sort((a,b) => new Date(b.created_at) - new Date(a.created_at));
  if (sortBy === 'oldest')   list.sort((a,b) => new Date(a.created_at) - new Date(b.created_at));
  if (sortBy === 'priority') list.sort((a,b) => (b.priority?1:0) - (a.priority?1:0) || new Date(b.created_at) - new Date(a.created_at));
  if (sortBy === 'energy')   list.sort((a,b) => ENERGY_ORDER[b.energy] - ENERGY_ORDER[a.energy] || new Date(b.created_at) - new Date(a.created_at));
  return list;
}

function renderTagFilters() {
  const tags = [...new Set(ideas.map(i=>i.tag).filter(Boolean))];
  const el = document.getElementById('tag-filter-row');
  if (!tags.length) { el.innerHTML = ''; return; }
  el.innerHTML = '<button class="chip' + (filterTag==='all'?' active':'') + '" data-tag="all"># all</button>' +
    tags.map(t => `<button class="chip${filterTag===t?' active':''}" data-tag="${t}"># ${esc(t)}</button>`).join('');
  el.querySelectorAll('[data-tag]').forEach(b => b.addEventListener('click', () => {
    filterTag = b.dataset.tag;
    renderTagFilters();
    render();
  }));
}

function renderStats() {
  document.getElementById('st-total').textContent = ideas.length;
  document.getElementById('st-raw').textContent = ideas.filter(i=>i.status==='raw').length;
  document.getElementById('st-prog').textContent = ideas.filter(i=>i.status==='in-progress').length;
  document.getElementById('st-ship').textContent = ideas.filter(i=>i.status==='shipped').length;
}

function render() {
  renderStats();
  renderTagFilters();
  const list = getFiltered();
  const grid = document.getElementById('ideas-list');
  const empty = document.getElementById('empty-state');

  if (!list.length) { grid.innerHTML = ''; empty.style.display = 'block'; return; }
  empty.style.display = 'none';

  // preserve open notes/status panels
  const openNotes  = new Set([...document.querySelectorAll('.card-notes.open')].map(el=>el.closest('.idea-card')?.dataset.id));
  const openStatus = new Set([...document.querySelectorAll('.card-status-panel.open')].map(el=>el.closest('.idea-card')?.dataset.id));

  grid.innerHTML = list.map(idea => {
    const no = openNotes.has(idea.id);
    const so = openStatus.has(idea.id);
    return `<div class="idea-card${idea.priority?' priority-on':''}" data-id="${idea.id}">
      <div class="card-row1">
        <div class="energy-pip ep-${idea.energy}"></div>
        <div class="card-body">
          <div class="card-text" data-field="text">${esc(idea.text)}</div>
          <div class="card-meta2">
            <span class="badge b-${idea.status}">${STATUS_LABELS[idea.status]||idea.status}</span>
            ${idea.tag ? `<span class="tag-badge"># ${esc(idea.tag)}</span>` : ''}
            <span class="age-badge">${ageLabel(idea.created_at)}</span>
          </div>
        </div>
        <div class="card-actions">
          <span class="act star-act${idea.priority?' on':''}" data-action="star" title="Priority">★</span>
          <button class="act" data-action="notes" title="Notes">≡</button>
          <button class="act" data-action="status" title="Status">↻</button>
          <button class="act" data-action="delete" title="Delete">✕</button>
        </div>
      </div>
      <div class="card-notes${no?' open':''}">
        <textarea class="notes-area" placeholder="add notes, links, next steps...">${esc(idea.notes||'')}</textarea>
      </div>
      <div class="card-status-panel${so?' open':''}">
        <div class="status-panel-inner">
          ${['raw','in-progress','parked','shipped','discarded'].map(s=>`<button class="s-opt badge b-${s}${s===idea.status?' badge b-'+s:''}" data-set-status="${s}">${STATUS_LABELS[s]}</button>`).join('')}
        </div>
      </div>
    </div>`;
  }).join('');

  // bind events
  grid.querySelectorAll('.idea-card').forEach(card => {
    const id = card.dataset.id;
    const idea = ideas.find(i=>i.id===id);
    if (!idea) return;

    card.querySelector('[data-action="delete"]').addEventListener('click', () => deleteIdea(id));

    card.querySelector('[data-action="star"]').addEventListener('click', () => {
      idea.priority = !idea.priority;
      updateIdea(id, { priority: idea.priority });
      render();
    });

    card.querySelector('[data-action="notes"]').addEventListener('click', () => {
      const n = card.querySelector('.card-notes');
      const s = card.querySelector('.card-status-panel');
      n.classList.toggle('open');
      if (n.classList.contains('open')) s.classList.remove('open');
      if (n.classList.contains('open')) n.querySelector('textarea').focus();
    });

    card.querySelector('[data-action="status"]').addEventListener('click', () => {
      const s = card.querySelector('.card-status-panel');
      const n = card.querySelector('.card-notes');
      s.classList.toggle('open');
      if (s.classList.contains('open')) n.classList.remove('open');
    });

    let notesTimer;
    card.querySelector('.notes-area').addEventListener('input', e => {
      idea.notes = e.target.value;
      clearTimeout(notesTimer);
      notesTimer = setTimeout(() => updateIdea(id, { notes: idea.notes }), 900);
    });

    card.querySelectorAll('[data-set-status]').forEach(btn => {
      btn.addEventListener('click', () => {
        idea.status = btn.dataset.setStatus;
        updateIdea(id, { status: idea.status });
        card.querySelector('.card-status-panel').classList.remove('open');
        render();
      });
    });

    // double-click to edit title
    const titleEl = card.querySelector('.card-text');
    titleEl.addEventListener('dblclick', () => {
      titleEl.contentEditable = 'true';
      titleEl.focus();
      const sel = window.getSelection(), range = document.createRange();
      range.selectNodeContents(titleEl); sel.removeAllRanges(); sel.addRange(range);
    });
    titleEl.addEventListener('blur', () => {
      const newText = titleEl.textContent.trim();
      if (newText && newText !== idea.text) {
        idea.text = newText;
        updateIdea(id, { text: newText });
      }
      titleEl.contentEditable = 'false';
    });
    titleEl.addEventListener('keydown', e => { if(e.key==='Enter'){e.preventDefault();titleEl.blur();} });
  });
}

// refresh age labels every minute
setInterval(() => { if (ideas.length) render(); }, 60000);
</script>
